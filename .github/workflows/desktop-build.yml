name: Desktop Builds

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: npm run desktop:build:mac
          - name: Windows
            os: windows-latest
            command: npm run desktop:build:win
          - name: Linux
            os: ubuntu-latest
            command: npm run desktop:build:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux package tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Build desktop package
        run: ${{ matrix.command }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: basic-clock-${{ matrix.name }}
          path: dist-native/**
