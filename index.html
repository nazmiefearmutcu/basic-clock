<!doctype html>
<html lang="en" data-theme="matrix">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08141f" />
    <title>Basic Clock</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2308141f'/%3E%3Cpath d='M32 12v22l14 8' stroke='%2339ff88' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='32' cy='32' r='22' stroke='%23d6f7ff' stroke-width='4' fill='none'/%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="icons/basic-clock-192.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand-home" id="brandHome" data-testid="brand-home" href="#clock" aria-label="Go to Clock home">
          <h1>Basic Clock</h1>
        </a>
        <nav class="tabs" aria-label="Main navigation">
          <button class="tab active" data-tab-target="clock" data-testid="tab-clock">Clock</button>
          <button class="tab" data-tab-target="alarms" data-testid="tab-alarms">Alarms</button>
          <button class="tab" data-tab-target="timer" data-testid="tab-timer">Timer</button>
          <button class="tab" data-tab-target="settings" data-testid="tab-settings">Settings</button>
        </nav>
      </header>

      <main>
        <section id="clock" class="page active" aria-labelledby="clock-heading">
          <div class="clock-panel">
            <div class="date-row">
              <span id="dateLabel">--</span>
              <span id="timezoneLabel">--</span>
            </div>
            <h2 id="clock-heading" class="sr-only">Digital clock</h2>
            <div id="digitalClock" class="digital-clock" data-testid="digital-clock">--:--:--</div>
            <div class="clock-meta">
              <div>
                <span class="meta-label">Next alarm</span>
                <strong id="nextAlarmLabel" data-testid="next-alarm">No alarms</strong>
              </div>
              <div>
                <span class="meta-label">Audio status</span>
                <strong id="audioStatus" data-testid="audio-status">Locked</strong>
              </div>
            </div>
          </div>
        </section>

        <section id="alarms" class="page" aria-labelledby="alarms-heading">
          <div class="section-head">
            <div>
              <p class="eyebrow">Daily and one-time</p>
              <h2 id="alarms-heading">Alarms</h2>
            </div>
            <button class="primary" id="unlockAudio" data-testid="unlock-audio">Enable audio</button>
          </div>

          <form id="alarmForm" class="form-grid">
            <label>
              Time
              <input id="alarmTime" type="time" required />
            </label>
            <label>
              Label
              <input id="alarmLabel" type="text" maxlength="40" value="Alarm" />
            </label>
            <label>
              Sound
              <select id="alarmSound">
                <option value="bell">Strong bell</option>
                <option value="pulse">Soft pulse</option>
                <option value="triple">Triple chime</option>
              </select>
            </label>
            <button class="primary" type="submit" data-testid="add-alarm">Add alarm</button>
          </form>

          <div class="quick-row" aria-label="Quick alarm actions">
            <button id="quickOne" data-testid="quick-one">+1 min alarm</button>
            <button id="quickTen" data-testid="quick-ten">+10 min alarm</button>
            <button id="quickTestAlarm" data-testid="quick-test-alarm">Test alarm +5 sec</button>
            <button id="testAlarmSound" data-testid="test-alarm-sound">Try alarm sound</button>
          </div>

          <div id="alarmList" class="list" data-testid="alarm-list"></div>
        </section>

        <section id="timer" class="page" aria-labelledby="timer-heading">
          <div class="section-head">
            <div>
              <p class="eyebrow">Countdown</p>
              <h2 id="timer-heading">Timer</h2>
            </div>
            <button id="testTimerSound" data-testid="test-timer-sound">Try timer sound</button>
          </div>

          <div class="timer-card">
            <div id="timerDisplay" class="timer-display" data-testid="timer-display">00:00</div>
            <div class="timer-inputs">
              <label>
                Minutes
                <input id="timerMinutes" type="number" min="0" max="999" value="1" />
              </label>
              <label>
                Seconds
                <input id="timerSeconds" type="number" min="0" max="59" value="0" />
              </label>
            </div>
            <div class="timer-actions">
              <button class="primary" id="startTimer" data-testid="start-timer">Start</button>
              <button id="pauseTimer" data-testid="pause-timer">Pause</button>
              <button id="resetTimer" data-testid="reset-timer">Reset</button>
              <button id="startThreeSecondTimer" data-testid="start-3s-timer">3 sec test timer</button>
            </div>
          </div>
        </section>

        <section id="settings" class="page" aria-labelledby="settings-heading">
          <div class="section-head">
            <div>
              <p class="eyebrow">Appearance and sound</p>
              <h2 id="settings-heading">Settings</h2>
            </div>
          </div>

          <div class="settings-grid">
            <label>
              Theme
              <select id="themeSelect" data-testid="theme-select">
                <option value="matrix">Matrix</option>
                <option value="midnight">Midnight</option>
                <option value="paper">Paper</option>
                <option value="ember">Ember</option>
              </select>
            </label>
            <label>
              Alarm sound
              <select id="defaultAlarmSound">
                <option value="bell">Strong bell</option>
                <option value="pulse">Soft pulse</option>
                <option value="triple">Triple chime</option>
              </select>
            </label>
            <label>
              Timer sound
              <select id="defaultTimerSound">
                <option value="triple">Triple chime</option>
                <option value="bell">Strong bell</option>
                <option value="pulse">Soft pulse</option>
              </select>
            </label>
            <label>
              Volume
              <input id="volumeRange" type="range" min="0" max="1" step="0.05" />
            </label>
            <label class="check-line">
              <input id="mutedToggle" type="checkbox" />
              Mute audio
            </label>
            <label class="check-line">
              <input id="hourToggle" type="checkbox" />
              12-hour clock
            </label>
            <label class="check-line">
              <input id="secondsToggle" type="checkbox" />
              Show seconds
            </label>
          </div>
        </section>
      </main>
    </div>

    <dialog id="ringDialog" class="ring-dialog" data-testid="ring-dialog">
      <div class="ring-content">
        <p id="ringKind" class="eyebrow">Alarm</p>
        <h2 id="ringTitle">Time is up</h2>
        <p id="ringDetail">Sound is playing.</p>
        <div class="ring-actions">
          <button class="primary" id="stopRing" data-testid="stop-ring">Stop</button>
          <button id="snoozeRing" data-testid="snooze-ring">Snooze 5 min</button>
        </div>
      </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
