<!doctype html>
<html lang="tr" data-theme="matrix">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zaman Terminali</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Yerel zaman terminali</p>
          <h1>Zaman Terminali</h1>
        </div>
        <nav class="tabs" aria-label="Ana sayfalar">
          <button class="tab active" data-tab-target="clock" data-testid="tab-clock">Saat</button>
          <button class="tab" data-tab-target="alarms" data-testid="tab-alarms">Alarmlar</button>
          <button class="tab" data-tab-target="timer" data-testid="tab-timer">Sayaç</button>
          <button class="tab" data-tab-target="settings" data-testid="tab-settings">Ayarlar</button>
        </nav>
      </header>

      <main>
        <section id="clock" class="page active" aria-labelledby="clock-heading">
          <div class="clock-panel">
            <div class="date-row">
              <span id="dateLabel">--</span>
              <span id="timezoneLabel">--</span>
            </div>
            <h2 id="clock-heading" class="sr-only">Dijital saat</h2>
            <div id="digitalClock" class="digital-clock" data-testid="digital-clock">--:--:--</div>
            <div class="clock-meta">
              <div>
                <span class="meta-label">Sıradaki alarm</span>
                <strong id="nextAlarmLabel" data-testid="next-alarm">Alarm yok</strong>
              </div>
              <div>
                <span class="meta-label">Ses durumu</span>
                <strong id="audioStatus" data-testid="audio-status">Kilitli</strong>
              </div>
            </div>
          </div>
        </section>

        <section id="alarms" class="page" aria-labelledby="alarms-heading">
          <div class="section-head">
            <div>
              <p class="eyebrow">Günlük ve tek seferlik</p>
              <h2 id="alarms-heading">Alarmlar</h2>
            </div>
            <button class="primary" id="unlockAudio" data-testid="unlock-audio">Sesi hazırla</button>
          </div>

          <form id="alarmForm" class="form-grid">
            <label>
              Saat
              <input id="alarmTime" type="time" required />
            </label>
            <label>
              Etiket
              <input id="alarmLabel" type="text" maxlength="40" value="Alarm" />
            </label>
            <label>
              Ses
              <select id="alarmSound">
                <option value="bell">Güçlü zil</option>
                <option value="pulse">Yumuşak pulse</option>
                <option value="triple">Üçlü sinyal</option>
              </select>
            </label>
            <button class="primary" type="submit" data-testid="add-alarm">Alarm ekle</button>
          </form>

          <div class="quick-row" aria-label="Hızlı alarm seçenekleri">
            <button id="quickOne" data-testid="quick-one">+1 dk alarm</button>
            <button id="quickTen" data-testid="quick-ten">+10 dk alarm</button>
            <button id="quickTestAlarm" data-testid="quick-test-alarm">Test alarmı +5 sn</button>
            <button id="testAlarmSound" data-testid="test-alarm-sound">Alarm sesini dene</button>
          </div>

          <div id="alarmList" class="list" data-testid="alarm-list"></div>
        </section>

        <section id="timer" class="page" aria-labelledby="timer-heading">
          <div class="section-head">
            <div>
              <p class="eyebrow">Geri sayım</p>
              <h2 id="timer-heading">Sayaç</h2>
            </div>
            <button id="testTimerSound" data-testid="test-timer-sound">Sayaç sesini dene</button>
          </div>

          <div class="timer-card">
            <div id="timerDisplay" class="timer-display" data-testid="timer-display">00:00</div>
            <div class="timer-inputs">
              <label>
                Dakika
                <input id="timerMinutes" type="number" min="0" max="999" value="1" />
              </label>
              <label>
                Saniye
                <input id="timerSeconds" type="number" min="0" max="59" value="0" />
              </label>
            </div>
            <div class="timer-actions">
              <button class="primary" id="startTimer" data-testid="start-timer">Başlat</button>
              <button id="pauseTimer" data-testid="pause-timer">Duraklat</button>
              <button id="resetTimer" data-testid="reset-timer">Sıfırla</button>
              <button id="startThreeSecondTimer" data-testid="start-3s-timer">3 sn test sayacı</button>
            </div>
          </div>
        </section>

        <section id="settings" class="page" aria-labelledby="settings-heading">
          <div class="section-head">
            <div>
              <p class="eyebrow">Görünüm ve ses</p>
              <h2 id="settings-heading">Ayarlar</h2>
            </div>
          </div>

          <div class="settings-grid">
            <label>
              Tema
              <select id="themeSelect" data-testid="theme-select">
                <option value="matrix">Matrix</option>
                <option value="midnight">Midnight</option>
                <option value="paper">Paper</option>
                <option value="ember">Ember</option>
              </select>
            </label>
            <label>
              Alarm sesi
              <select id="defaultAlarmSound">
                <option value="bell">Güçlü zil</option>
                <option value="pulse">Yumuşak pulse</option>
                <option value="triple">Üçlü sinyal</option>
              </select>
            </label>
            <label>
              Sayaç sesi
              <select id="defaultTimerSound">
                <option value="triple">Üçlü sinyal</option>
                <option value="bell">Güçlü zil</option>
                <option value="pulse">Yumuşak pulse</option>
              </select>
            </label>
            <label>
              Ses seviyesi
              <input id="volumeRange" type="range" min="0" max="1" step="0.05" />
            </label>
            <label class="check-line">
              <input id="mutedToggle" type="checkbox" />
              Sesi kapat
            </label>
            <label class="check-line">
              <input id="hourToggle" type="checkbox" />
              12 saat formatı
            </label>
            <label class="check-line">
              <input id="secondsToggle" type="checkbox" />
              Saniyeleri göster
            </label>
          </div>
        </section>
      </main>
    </div>

    <dialog id="ringDialog" class="ring-dialog" data-testid="ring-dialog">
      <div class="ring-content">
        <p id="ringKind" class="eyebrow">Alarm</p>
        <h2 id="ringTitle">Zaman doldu</h2>
        <p id="ringDetail">Ses çalıyor.</p>
        <div class="ring-actions">
          <button class="primary" id="stopRing" data-testid="stop-ring">Sustur</button>
          <button id="snoozeRing" data-testid="snooze-ring">5 dk ertele</button>
        </div>
      </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
